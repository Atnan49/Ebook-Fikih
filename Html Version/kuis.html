<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuis Fikih Interaktif</title>
    <!-- Google Fonts: Inter (Latin) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Link CSS Utama -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-pattern">

    <!-- 
      ======================================================
      [JOB: NARENDRA] Quiz Page & Interactivity Layout
      ======================================================
      Tugas Narendra:
      1. Rancang 3 tombol tab navigasi di bagian atas kuis:
         - Tab 1: Pilihan Ganda
         - Tab 2: Soal Essay
         - Tab 3: Tugas Praktik
      2. Buat container untuk masing-masing tab yang isinya akan disembunyikan/ditampilkan berdasarkan tab yang aktif.
      3. Di Tab Pilihan Ganda:
         - Buat area untuk merender 10 pertanyaan PG satu per satu atau sekaligus.
         - Tiap pertanyaan memiliki 3 opsi jawaban.
         - Opsi jawaban yang dipilih memiliki style aktif (selected).
         - Sediakan tombol "Kirim Jawaban" untuk melihat skor dan ulasan jawaban benar/salah secara langsung.
      4. Di Tab Soal Essay:
         - Render 5 pertanyaan essay.
         - Tiap pertanyaan memiliki textarea tempat menulis jawaban dan tombol "Lihat Kunci Jawaban" untuk mencocokkan secara mandiri.
      5. Di Tab Tugas Praktik:
         - Render instruksi tugas praktik wudhu / tayamum.
         - Sediakan tombol kirim video ke WhatsApp yang mengarah langsung ke tautan WA.
      6. Hubungkan halaman ini dengan `js/data.js` dan `js/quiz.js` untuk memproses logika kuisnya.
    -->

    <header class="container">
        <h1>Kuis Fikih Interaktif ✏️</h1>
        <p>Ayo uji pemahamanmu setelah membaca E-Book!</p>
    </header>

    <main class="quiz-main-container">
        <!-- Tab Navigation -->
        <nav class="quiz-tabs">
            <button class="tab-btn active" data-tab="pg">Pilihan Ganda</button>
            <button class="tab-btn" data-tab="essay">Soal Essay</button>
            <button class="tab-btn" data-tab="praktik">Tugas Praktik</button>
        </nav>

        <!-- Tab Content: Pilihan Ganda -->
        <section id="tab-pg" class="tab-content active glass-card-strong">
            <!-- Isi Kuis Pilihan Ganda (dimuat dinamis) -->
        </section>

        <!-- Tab Content: Soal Essay -->
        <section id="tab-essay" class="tab-content glass-card-strong" style="display: none;">
            <!-- Isi Kuis Essay (dimuat dinamis) -->
        </section>

        <!-- Tab Content: Tugas Praktik -->
        <section id="tab-praktik" class="tab-content glass-card-strong" style="display: none;">
            <!-- Isi Tugas Praktik dan Tombol WA -->
        </section>
    </main>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/quiz.js"></script>
</body>
</html>
